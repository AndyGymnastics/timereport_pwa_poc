<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Tidrapport PoC</title>
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <script src="https://cdn.webpushr.com/app.js" async></script>
    <script>
        window.webpushr = window.webpushr || function () { (window.webpushr.q = window.webpushr.q || []).push(arguments) };
        webpushr('setup', { 'key': 'a9c0e98a6abda14c288398748a53e14c' });
    </script>

    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 40px 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { 
            padding: 18px; margin: 10px 0; width: 100%; max-width: 300px; 
            font-size: 16px; font-weight: bold; cursor: pointer; 
            border: none; border-radius: 10px; background: #007aff; color: white; 
        }
        .secondary { background: #34c759; }
        #status { margin-top: 20px; color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Tidrapportering</h1>
        <button onclick="sendTime()">Rapportera Tid Nu</button>
        <div id="status">Redo</div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyOEiZOkAI-M91t1YF08dVxWFxvBT1w2X9UxI7t-nhZy_gjG26ArNtM2hG2kIsrITBv/exec";

        async function sendTime() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Skickar...";
            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        type: "log",
                        user: "PoC-Användare",
                        note: "Loggat från PWA"
                    })
                });
                statusDiv.innerText = "Sparat i Google Sheets!";
            } catch (e) {
                statusDiv.innerText = "Fel: " + e;
            }
        }
    </script>
</body>
</html>
